<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smack the Mole</title>
  
</head>
<body>
    
    <img src="bg.png" class="bg">
  <div class="game-wrapper">
    <div class="top-bar">
      <div class="title-block">
        <h1>Smack the Mole</h1>
        <p>Hit the mole before it hides again!</p>
      </div>

      <div class="stats">
        <div class="stat-box">
          <div class="stat-label">Score</div>
          <div class="stat-value" id="score">0</div>
        </div>

        <div class="stat-box">
          <div class="stat-label">Time</div>
          <div class="stat-value" id="time">30</div>
        </div>

        <div class="stat-box">
          <div class="stat-label">Best</div>
          <div class="stat-value" id="best">0</div>
        </div>
      </div>

      <div class="controls">
        <button id="startBtn">Start Game</button>
        <button id="resetBtn">Reset</button>
      </div>
    </div>

    <div class="game-area">
      <div class="feedback" id="feedback">+1</div>

      <div class="grid" id="grid">
        <div class="hole-wrap" data-index="0">
          <img class="mole" src="mole.png" alt="mole" />
          <img class="hole" src="hole.png" alt="hole" />
        </div>

        <div class="hole-wrap" data-index="1">
          <img class="mole" src="mole.png" alt="mole" />
          <img class="hole" src="hole.png" alt="hole" />
        </div>

        <div class="hole-wrap" data-index="2">
          <img class="mole" src="mole.png" alt="mole" />
          <img class="hole" src="hole.png" alt="hole" />
        </div>

        <div class="hole-wrap" data-index="3">
          <img class="mole" src="mole.png" alt="mole" />
          <img class="hole" src="hole.png" alt="hole" />
        </div>

        <div class="hole-wrap" data-index="4">
          <img class="mole" src="mole.png" alt="mole" />
          <img class="hole" src="hole.png" alt="hole" />
        </div>

        <div class="hole-wrap" data-index="5">
          <img class="mole" src="mole.png" alt="mole" />
          <img class="hole" src="hole.png" alt="hole" />
        </div>
      </div>
    </div>

    <div class="overlay" id="overlay">
      <div class="card">
        <h2>Ready?</h2>
        <p>Smack as many moles as you can before time runs out.</p>
        <button id="overlayStartBtn">Play Now</button>
      </div>
    </div>
  </div>

  <script>
    const holes = document.querySelectorAll(".hole-wrap");
    const scoreEl = document.getElementById("score");
    const timeEl = document.getElementById("time");
    const bestEl = document.getElementById("best");
    const feedbackEl = document.getElementById("feedback");
    const startBtn = document.getElementById("startBtn");
    const resetBtn = document.getElementById("resetBtn");
    const overlay = document.getElementById("overlay");
    const overlayStartBtn = document.getElementById("overlayStartBtn");

    let score = 0;
    let timeLeft = 30;
    let gameRunning = false;
    let gameTimer = null;
    let moleTimer = null;
    let activeHole = null;
    let bestScore = Number(localStorage.getItem("moleBest")) || 0;

    bestEl.textContent = bestScore;

    function randomHole() {
      const index = Math.floor(Math.random() * holes.length);
      return holes[index];
    }

    function clearActiveMole() {
      holes.forEach(hole => {
        hole.classList.remove("active", "hit");
        const moleImg = hole.querySelector(".mole");
        moleImg.src = "mole.png";
        moleImg.dataset.hit = "false";
      });
      activeHole = null;
    }

    function showMole() {
      if (!gameRunning) return;

      clearActiveMole();

      const hole = randomHole();
      activeHole = hole;
      hole.classList.add("active");

      const moleImg = hole.querySelector(".mole");
      moleImg.dataset.hit = "false";

      const visibleTime = Math.floor(Math.random() * 500) + 650;

      moleTimer = setTimeout(() => {
        if (activeHole === hole) {
          hole.classList.remove("active");
          activeHole = null;
        }
        showMole();
      }, visibleTime);
    }

    function updateScore(value) {
      score += value;
      scoreEl.textContent = score;
      feedbackEl.textContent = `+${value}`;
      feedbackEl.classList.add("show");

      setTimeout(() => {
        feedbackEl.classList.remove("show");
      }, 250);
    }

    function endGame() {
      gameRunning = false;
      clearTimeout(gameTimer);
      clearTimeout(moleTimer);
      clearActiveMole();

      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem("moleBest", bestScore);
        bestEl.textContent = bestScore;
      }

      overlay.classList.remove("hidden");
      overlay.querySelector(".card").innerHTML = `
        <h2>Time's Up!</h2>
        <p>Your final score:</p>
        <div class="big-score">${score}</div>
        <button id="playAgainBtn">Play Again</button>
      `;

      document.getElementById("playAgainBtn").addEventListener("click", startGame);
    }

    function startCountdown() {
      gameTimer = setInterval(() => {
        timeLeft--;
        timeEl.textContent = timeLeft;

        if (timeLeft <= 0) {
          clearInterval(gameTimer);
          endGame();
        }
      }, 1000);
    }

    function startGame() {
      clearTimeout(gameTimer);
      clearTimeout(moleTimer);

      score = 0;
      timeLeft = 30;
      gameRunning = true;

      scoreEl.textContent = score;
      timeEl.textContent = timeLeft;
      overlay.classList.add("hidden");

      showMole();
      startCountdown();
    }

    function resetGame() {
      gameRunning = false;
      clearInterval(gameTimer);
      clearTimeout(moleTimer);
      score = 0;
      timeLeft = 30;
      scoreEl.textContent = score;
      timeEl.textContent = timeLeft;
      clearActiveMole();
      overlay.classList.remove("hidden");
      overlay.querySelector(".card").innerHTML = `
        <h2>Ready?</h2>
        <p>Smack as many moles as you can before time runs out.</p>
        <button id="overlayStartBtn">Play Now</button>
      `;
      document.getElementById("overlayStartBtn").addEventListener("click", startGame);
    }

    holes.forEach(hole => {
      const moleImg = hole.querySelector(".mole");

      moleImg.addEventListener("click", () => {
        if (!gameRunning) return;
        if (!hole.classList.contains("active")) return;
        if (moleImg.dataset.hit === "true") return;

        moleImg.dataset.hit = "true";
        hole.classList.add("hit");
        moleImg.src = "hit.png";
        updateScore(1);

        setTimeout(() => {
          hole.classList.remove("active", "hit");
          moleImg.src = "mole.png";
          activeHole = null;
        }, 180);
      });
    });

    startBtn.addEventListener("click", startGame);
    resetBtn.addEventListener("click", resetGame);
    overlayStartBtn.addEventListener("click", startGame);
  </script>
</body>
</html>
